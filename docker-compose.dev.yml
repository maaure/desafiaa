services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quizpass
      POSTGRES_DB: quizplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quizplatform"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://quiz:quizpass@postgres:5432/quizplatform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production-minimum-32-chars!!
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32-chars!!
      HOST: "0.0.0.0"
      PORT: "3000"
      UPLOAD_DIR: /app/uploads
    volumes:
      # Hot reload: alterações em src/ disparam restart automático
      - ./src:/app/src
      # Uploads persistem entre reinícios
      - uploads-dev:/app/uploads
      # node_modules fica isolado dentro do container
      - /app/node_modules

volumes:
  pgdata-dev:
  uploads-dev:
