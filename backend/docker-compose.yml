services:
  postgres:
    container_name: desafia-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quizpass
      POSTGRES_DB: quizplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quizplatform"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    container_name: desafia-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    container_name: desafia-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://quiz:quizpass@postgres:5432/quizplatform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production-minimum-32-chars!!
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-32-chars!!
      HOST: "0.0.0.0"
      PORT: "3000"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads

  nginx:
    container_name: desafia-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
